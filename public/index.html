<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0b0c10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="description" content="GradeVault — FUTO GPA & CGPA Calculator"/>
<title>GradeVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0c10;--surface:#13151c;--card:#1a1d27;
  --border:#252836;--border2:#313547;
  --gold:#d4a843;--gold2:#f0c96a;
  --green:#3da86c;--red:#e74c3c;
  --blue:#2980b9;
  --text:#eceef5;--text2:#9ba0b4;--text3:#5c6177;
  --A:#3da86c;--B:#2980b9;--C:#d4a843;--D:#c0784a;--E:#c0392b;--F:#6b2d2d;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-size:15px}

/* ─── AUTH ──────────────────────────────── */
#auth{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 25% 15%,#1a1232 0%,var(--bg) 65%)}
.a-box{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 24px 28px;box-shadow:0 0 80px rgba(212,168,67,.06),0 24px 48px rgba(0,0,0,.5)}
.a-logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);letter-spacing:-.3px}
.a-sub{color:var(--text3);font-size:11px;margin-top:3px;margin-bottom:28px}
.a-tabs{display:flex;background:var(--card);border-radius:9px;padding:3px;gap:3px;margin-bottom:20px}
.a-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--text3);border:none;background:none;font-family:inherit;transition:all .18s}
.a-tab.on{background:var(--gold);color:#0b0c10}
.a-label{display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:5px}
.a-input{display:block;width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:13px 14px;font-family:inherit;font-size:15px;outline:none;transition:border-color .18s;margin-bottom:13px;-webkit-appearance:none}
.a-input:focus{border-color:var(--gold)}
.a-err{font-size:12px;color:var(--red);background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);border-radius:7px;padding:9px 11px;margin-bottom:12px;display:none}
.a-btn{width:100%;background:var(--gold);color:#0b0c10;border:none;padding:14px;border-radius:9px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:background .18s;margin-top:2px}
.a-btn:hover{background:var(--gold2)}
.a-btn:disabled{opacity:.45;cursor:not-allowed}

/* ─── APP ───────────────────────────────── */
#app{display:none;min-height:100dvh;flex-direction:column}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:50px;gap:10px;position:sticky;top:0;z-index:100;flex-shrink:0}
.h-logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold)}
.h-sp{flex:1}
.h-user{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:4px 11px 4px 5px;cursor:pointer;transition:border-color .18s}
.h-user:hover{border-color:var(--gold)}
.h-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#9a6a10);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:#0b0c10;flex-shrink:0}
.h-name{font-size:12px;font-weight:600;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-out{font-size:10px;color:var(--text3)}

/* Stats */
.stats{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:0}
.stats::-webkit-scrollbar{display:none}
.sc{display:flex;flex-direction:column;gap:1px;flex-shrink:0;padding-right:13px}
.sl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap}
.sv{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--gold)}
.sv.g{color:var(--green)}.sv.b{color:var(--red)}
.sc.sm .sv{font-size:12px;color:var(--text2)}
.sdiv{width:1px;height:30px;background:var(--border);flex-shrink:0;margin-right:13px}
.cgpa{flex-shrink:0;margin-left:8px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:5px 13px;display:flex;flex-direction:column;align-items:center}
.cgpa .cl{font-size:9px;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:0px}
.cgpa .cv{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);line-height:1.1}
.cgpa .cc{font-size:9px;color:var(--text2);white-space:nowrap}

/* Year / sem tabs */
.ytabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ytabs::-webkit-scrollbar{display:none}
.yb{padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;background:none;border:none;border-bottom:2px solid transparent;font-family:inherit;transition:all .18s}
.yb:hover{color:var(--text)}.yb.on{color:var(--gold);border-bottom-color:var(--gold)}
.stabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex}
.stab{flex:1;padding:8px 4px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;background:none;border:none;border-bottom:2px solid transparent;font-family:inherit;transition:all .18s}
.stab:hover{color:var(--text)}.stab.on{color:var(--gold);border-bottom-color:var(--gold)}
.stab .gt{display:block;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:1px}
.stab.on .gt{color:var(--gold)}

/* Offline bar */
.offbar{background:rgba(231,76,60,.1);border-bottom:1px solid rgba(231,76,60,.2);padding:5px 16px;font-size:11px;color:var(--red);text-align:center;display:none}
.offbar.on{display:block}

/* Content */
.content{flex:1;padding:14px 16px;max-width:860px;width:100%;margin:0 auto}
.semhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.semtitle{font-family:'Playfair Display',serif;font-size:17px}
.semdetail{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.addBtn{background:var(--gold);color:#0b0c10;border:none;padding:8px 13px;border-radius:9px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;flex-shrink:0;transition:background .18s}
.addBtn:hover{background:var(--gold2)}
.addBtn svg{width:12px;height:12px}

/* Table */
.tw{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:420px}
thead th{background:var(--card);padding:9px 11px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.015)}
td{padding:7px 11px;font-size:13px}
.ci{background:transparent;border:1px solid transparent;color:var(--text);font-family:inherit;font-size:13px;padding:4px 7px;border-radius:6px;width:100%;outline:none;-webkit-appearance:none;transition:all .12s}
.ci:hover{border-color:var(--border2);background:var(--card)}
.ci:focus{border-color:var(--gold);background:var(--card)}
.ci.uu{width:48px;text-align:center;font-family:'DM Mono',monospace}
.gs{appearance:none;-webkit-appearance:none;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:4px 7px;border-radius:6px;cursor:pointer;outline:none;transition:border-color .12s;min-width:56px;text-align:center}
.gs:focus{border-color:var(--gold)}
.gA{color:var(--A)}.gB{color:var(--B)}.gC{color:var(--C)}.gD{color:var(--D)}.gE{color:var(--E)}.gF{color:var(--F)}
.gpc{font-family:'DM Mono',monospace;color:var(--text2);font-size:11px}
.xb{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:3px 7px;border-radius:5px;transition:all .15s}
.xb:hover{color:var(--red);background:rgba(231,76,60,.1)}
.tr2 td{background:var(--card);border-top:1px solid var(--border2);font-weight:600;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.tr2 .tg{color:var(--gold);font-size:13px}
.empty{padding:44px 16px;text-align:center}
.empty .ei{font-size:32px;margin-bottom:9px;opacity:.25}
.empty p{color:var(--text3);font-size:12px}

/* Class colours */
.cf{color:var(--green)}.csu{color:#5dade2}.csl{color:var(--gold)}.ct{color:#e59866}.cp{color:var(--text3)}

/* Save pill */
.pill{position:fixed;bottom:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:6px 13px;font-size:11px;color:var(--text3);opacity:0;transition:opacity .25s;pointer-events:none;z-index:200}
.pill.saving{opacity:1;color:var(--gold)}.pill.saved{opacity:1;color:var(--green)}.pill.fail{opacity:1;color:var(--red)}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 16px;font-size:12px;color:var(--text2);opacity:0;transition:opacity .25s;z-index:300;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1}

::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="a-box">
    <div class="a-logo">GradeVault</div>
    <div class="a-sub">FUTO · GPA &amp; CGPA Calculator · 5-Point Scale</div>
    <div class="a-tabs">
      <button class="a-tab on" id="tl" onclick="tab('login')">Login</button>
      <button class="a-tab"    id="tr" onclick="tab('register')">Register</button>
    </div>
    <div class="a-err" id="aerr"></div>
    <label class="a-label">Username</label>
    <input class="a-input" id="au" type="text" placeholder="Enter username" autocomplete="username" maxlength="32"/>
    <label class="a-label">Password</label>
    <input class="a-input" id="ap" type="password" placeholder="Enter password" autocomplete="current-password"/>
    <button class="a-btn" id="ab" onclick="go()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="h-logo">GradeVault</div>
    <div class="h-sp"></div>
    <div class="h-user" onclick="logout()">
      <div class="h-av" id="hav"></div>
      <span class="h-name" id="hname"></span>
      <span class="h-out">↩</span>
    </div>
  </header>

  <div class="offbar" id="offbar">⚠ Offline — working from cache</div>

  <div class="stats">
    <div class="sc">
      <div class="sl">Sem GPA</div>
      <div class="sv" id="scur">—</div>
    </div>
    <div class="sdiv"></div>
    <div id="minis" style="display:flex"></div>
    <div class="cgpa">
      <div class="cl">CGPA</div>
      <div class="cv" id="cgv">—</div>
      <div class="cc" id="cgc"></div>
    </div>
  </div>

  <div class="ytabs" id="ytabs"></div>
  <div class="stabs" id="stabs"></div>

  <div class="content">
    <div class="semhdr">
      <div>
        <div class="semtitle" id="stitle">—</div>
        <div class="semdetail" id="sdetail"></div>
      </div>
      <button class="addBtn" onclick="add()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>Add Course
      </button>
    </div>
    <div class="tw">
      <table>
        <thead><tr>
          <th style="width:105px">Code</th><th>Title</th>
          <th style="width:64px;text-align:center">Units</th>
          <th style="width:70px;text-align:center">Grade</th>
          <th style="width:62px;text-align:center">GP×CU</th>
          <th style="width:34px"></th>
        </tr></thead>
        <tbody id="tb"></tbody>
        <tfoot  id="tf"></tfoot>
      </table>
    </div>
  </div>
</div>

<div class="pill"  id="pill"></div>
<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────
const GP = {A:5,B:4,C:3,D:2,E:1,F:0};
const YEARS = [
  {y:'Year 1',s:['y1s1','y1s2']},{y:'Year 2',s:['y2s1','y2s2']},
  {y:'Year 3',s:['y3s1','y3s2']},{y:'Year 4',s:['y4s1','y4s2']},
  {y:'Year 5',s:['y5s1','y5s2']},
];
const SEMS = YEARS.flatMap(y=>y.s);
const SN = {
  y1s1:'Year 1 · Sem 1',y1s2:'Year 1 · Sem 2',y2s1:'Year 2 · Sem 1',y2s2:'Year 2 · Sem 2',
  y3s1:'Year 3 · Sem 1',y3s2:'Year 3 · Sem 2',y4s1:'Year 4 · Sem 1',y4s2:'Year 4 · Sem 2',
  y5s1:'Year 5 · Sem 1',y5s2:'Year 5 · Sem 2',
};
const K = {tok:'gv_tok',me:'gv_me',cache:'gv_cache'};

// ── State ───────────────────────────────────────────────────
let tok=ls(K.tok), me=ls(K.me), curY=0, curS='y1s1', D=null, lastH='', sT=null, online=navigator.onLine;

// ── Utils ───────────────────────────────────────────────────
function ls(k){try{return localStorage.getItem(k)||''}catch{return''}}
function lss(k,v){try{localStorage.setItem(k,v)}catch{}}
function lsd(k){try{localStorage.removeItem(k)}catch{}}
function norm(s={}){const o={};SEMS.forEach(k=>{o[k]=Array.isArray(s?.[k])?s[k]:[]});return o}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function fmt(n){return n===null?'—':n.toFixed(2)}
function H(){return{'Content-Type':'application/json','X-Auth-Token':tok||''}}

async function api(m,p,b,retry=1){
  for(let i=0;i<=retry;i++){
    try{
      const o={method:m,headers:H()};if(b)o.body=JSON.stringify(b);
      const r=await fetch(p,o);const j=await r.json().catch(()=>({}));
      if(r.status===401){hardOut();return{ok:false,...j}}
      return{ok:r.ok,status:r.status,...j}
    }catch(e){if(i<retry)await new Promise(r=>setTimeout(r,1500));else return{ok:false,error:'Network error'}}
  }
}

async function hash(s){
  try{const j=JSON.stringify(s,Object.keys(s).sort());const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(j));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('').slice(0,16)}
  catch{return String(JSON.stringify(s).length)}
}

// ── Online ──────────────────────────────────────────────────
function setOnline(v){online=v;document.getElementById('offbar').classList.toggle('on',!v);if(v&&D)save()}
window.addEventListener('online',()=>setOnline(true));
window.addEventListener('offline',()=>setOnline(false));

// ── Toast ───────────────────────────────────────────────────
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.className='toast on';clearTimeout(e._t);e._t=setTimeout(()=>e.className='toast',2600)}

// ── Auth ────────────────────────────────────────────────────
let mode='login';
function tab(m){
  mode=m;
  document.getElementById('tl').classList.toggle('on',m==='login');
  document.getElementById('tr').classList.toggle('on',m==='register');
  document.getElementById('ab').textContent=m==='login'?'Login':'Create Account';
  document.getElementById('ap').autocomplete=m==='login'?'current-password':'new-password';
  err('');
}
function err(msg){const e=document.getElementById('aerr');e.textContent=msg;e.style.display=msg?'block':'none'}

async function go(){
  const u=document.getElementById('au').value.trim(),p=document.getElementById('ap').value;
  const b=document.getElementById('ab');
  if(!u||!p){err('Fill in all fields');return}
  b.disabled=true;b.textContent=mode==='login'?'Logging in…':'Creating account…';err('');
  const r=await api('POST',`/api/${mode}`,{username:u,password:p},2);
  b.disabled=false;tab(mode);
  if(!r.ok){err(r.error||'Something went wrong');return}
  tok=r.token;me=r.username;lss(K.tok,tok);lss(K.me,me);
  await launch(false);
}

// ── Launch ──────────────────────────────────────────────────
async function launch(useCache=true){
  if(!tok){showAuth();return}
  const cached=tryCache();
  if(cached&&useCache){
    me=ls(K.me);D={semesters:norm(cached.semesters)};lastH=cached.hash||'';
    mount();syncBg(cached.updated_at);
  } else {
    const r=await api('GET','/api/data',null,2);
    if(!r.ok){if(cached){D={semesters:norm(cached.semesters)};mount();setOnline(false)}else hardOut();return}
    me=r.username;lss(K.me,me);D={semesters:norm(r.semesters)};
    await saveCache(r.semesters,r.updated_at);mount();
  }
}

async function syncBg(localTs){
  const r=await api('GET','/api/data',null,1);
  if(!r.ok){setOnline(false);return}setOnline(true);
  const st=r.updated_at?new Date(r.updated_at).getTime():0;
  const lt=localTs?new Date(localTs).getTime():0;
  if(st>lt){D={semesters:norm(r.semesters)};await saveCache(r.semesters,r.updated_at);renderT();stats();toast('Synced')}
}

function mount(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('hname').textContent=me;
  document.getElementById('hav').textContent=me.charAt(0).toUpperCase();
  buildY();buildMini();switchY(0,true);
}
function showAuth(){document.getElementById('app').style.display='none';document.getElementById('auth').style.display='flex'}
function hardOut(){tok='';me='';D=null;lastH='';lsd(K.tok);lsd(K.me);lsd(K.cache);showAuth()}
async function logout(){api('POST','/api/logout',{});hardOut()}

// ── Cache ───────────────────────────────────────────────────
function tryCache(){try{const r=localStorage.getItem(K.cache);return r?JSON.parse(r):null}catch{return null}}
async function saveCache(s,ts){const h=await hash(s);lss(K.cache,JSON.stringify({semesters:s,updated_at:ts,hash:h}));return h}

// ── Tabs ────────────────────────────────────────────────────
function buildY(){
  document.getElementById('ytabs').innerHTML=YEARS.map((y,i)=>`<button class="yb" id="yb${i}" onclick="switchY(${i})">${y.y}</button>`).join('')
}
function buildMini(){
  document.getElementById('minis').innerHTML=SEMS.map(s=>`<div class="sc sm" style="padding-right:11px"><div class="sl">${s.toUpperCase()}</div><div class="sv" id="m${s}">—</div></div>`).join('')
}
function switchY(i,first=false){
  curY=i;document.querySelectorAll('.yb').forEach((b,j)=>b.classList.toggle('on',i===j));
  const ss=YEARS[i].s;
  document.getElementById('stabs').innerHTML=ss.map(s=>`<button class="stab" id="st${s}" onclick="switchS('${s}')">Sem ${s.slice(-1)}<span class="gt" id="stg${s}">—</span></button>`).join('');
  switchS(first?'y1s1':(ss.includes(curS)?curS:ss[0]));
}
function switchS(s){
  const yi=YEARS.findIndex(y=>y.s.includes(s));if(yi!==-1&&yi!==curY){switchY(yi);return}
  curS=s;document.querySelectorAll('.stab').forEach(t=>t.classList.toggle('on',t.id==='st'+s));
  document.getElementById('stitle').textContent=SN[s];renderT();stats();
}

// ── Table ───────────────────────────────────────────────────
function renderT(){
  const cs=D.semesters[curS]||[];
  const tb=document.getElementById('tb'),tf=document.getElementById('tf');
  if(!cs.length){
    tb.innerHTML=`<tr><td colspan="6"><div class="empty"><div class="ei">📚</div><p>No courses yet — tap <strong>Add Course</strong></p></div></td></tr>`;
    tf.innerHTML='';document.getElementById('sdetail').textContent='';return;
  }
  tb.innerHTML=cs.map((c,i)=>{
    const g=GP[c.grade]??null,u=parseFloat(c.units)||0;
    const ct=(g!==null&&u>0&&c.grade!=='')?g*u:'—';
    const gc=c.grade?`g${c.grade}`:'';
    return`<tr>
      <td><input class="ci" value="${x(c.code)}" placeholder="MTH 101" oninput="upd(${i},'code',this.value)"/></td>
      <td><input class="ci" value="${x(c.title)}" placeholder="Course title" oninput="upd(${i},'title',this.value)"/></td>
      <td style="text-align:center"><input class="ci uu" type="number" min="1" max="6" value="${c.units||''}" placeholder="2" oninput="upd(${i},'units',this.value)"/></td>
      <td style="text-align:center">
        <select class="gs ${gc}" onchange="upd(${i},'grade',this.value)">
          <option value="">—</option>
          ${['A','B','C','D','E','F'].map(g=>`<option value="${g}"${c.grade===g?' selected':''}class="g${g}">${g}</option>`).join('')}
        </select>
      </td>
      <td class="gpc" style="text-align:center">${ct==='—'?'—':ct}</td>
      <td><button class="xb" onclick="del(${i})">✕</button></td>
    </tr>`
  }).join('');
  totals(cs);
}
function totals(cs){
  const{tgp,tnu,gpa}=calcS(cs);
  document.getElementById('tf').innerHTML=`
    <tr class="tr2"><td colspan="2" style="text-align:right">Totals</td><td style="text-align:center">${tnu||'—'}</td><td></td><td style="text-align:center">${tgp||'—'}</td><td></td></tr>
    <tr class="tr2"><td colspan="4" style="text-align:right;color:var(--text3)">Semester GPA</td><td class="tg" style="text-align:center">${fmt(gpa)}</td><td></td></tr>`;
  document.getElementById('sdetail').textContent=gpa!==null?`TGP ${tgp} ÷ TNU ${tnu} = ${fmt(gpa)}`:'';
}
function partialT(cs){
  if(!cs.length){document.getElementById('tf').innerHTML='';return}
  document.getElementById('tb').querySelectorAll('tr').forEach((r,i)=>{
    if(!cs[i])return;const c=cs[i],g=GP[c.grade]??null,u=parseFloat(c.units)||0;
    const ct=(g!==null&&u>0&&c.grade!=='')?g*u:'—';
    const gc=r.querySelectorAll('td')[4];if(gc)gc.textContent=ct==='—'?'—':ct;
    const sel=r.querySelector('.gs');if(sel)sel.className='gs'+(c.grade?` g${c.grade}`:'');
  });totals(cs);
}
function add(){
  D.semesters[curS].push({code:'',title:'',units:'',grade:''});
  renderT();stats();sched();
  setTimeout(()=>{const i=document.querySelectorAll('#tb tr:last-child input');if(i.length)i[0].focus()},40);
}
function del(i){D.semesters[curS].splice(i,1);renderT();stats();sched()}
function upd(i,f,v){D.semesters[curS][i][f]=v;partialT(D.semesters[curS]);stats();sched()}

// ── Stats ───────────────────────────────────────────────────
function stats(){
  const ss=D.semesters;
  SEMS.forEach(s=>{
    const{gpa}=calcS(ss[s]||[]);
    const m=document.getElementById('m'+s);if(m){m.textContent=fmt(gpa);m.className='sv '+gc(gpa)}
    const g=document.getElementById('stg'+s);if(g)g.textContent=fmt(gpa);
  });
  const{gpa:cur}=calcS(ss[curS]||[]);
  const ce=document.getElementById('scur');ce.textContent=fmt(cur);ce.className='sv '+gc(cur);
  const cg=calcCG(ss);
  document.getElementById('cgv').textContent=fmt(cg);
  const ce2=document.getElementById('cgc');ce2.textContent=clabel(cg);ce2.className='cc '+cbadge(cg);
}

// ── Save ────────────────────────────────────────────────────
function sched(){
  pill('Saving…','saving');clearTimeout(sT);sT=setTimeout(save,1100);
}
async function save(){
  if(!online){await saveCache(D.semesters,null);pill('Saved locally','saved');return}
  const h=await hash(D.semesters);
  if(h===lastH){pill('','');return}
  const r=await api('PUT','/api/data',{semesters:D.semesters,hash:h},1);
  if(r.ok){if(!r.skipped){await saveCache(D.semesters,r.updated_at);lastH=r.hash||h}pill('Saved ✓','saved')}
  else{await saveCache(D.semesters,null);pill('Sync failed','fail')}
}
function pill(msg,cls){
  const e=document.getElementById('pill');e.textContent=msg;
  e.className='pill'+(cls?' '+cls:'');
  if(cls==='saved'||cls==='fail')setTimeout(()=>e.className='pill',2000);
}

// ── Calc ────────────────────────────────────────────────────
function calcS(cs){let tgp=0,tnu=0;cs.forEach(c=>{const u=parseFloat(c.units)||0,g=GP[c.grade]??null;if(u>0&&g!==null&&c.grade!==''){tgp+=g*u;tnu+=u}});return tnu===0?{tgp:0,tnu:0,gpa:null}:{tgp,tnu,gpa:tgp/tnu}}
function calcCG(ss){let t=0,n=0;SEMS.forEach(s=>{const r=calcS(ss[s]||[]);t+=r.tgp;n+=r.tnu});return n===0?null:t/n}
function clabel(c){if(c===null)return'';if(c>=4.5)return'First Class';if(c>=3.5)return'2nd Class Upper';if(c>=2.5)return'2nd Class Lower';if(c>=1.5)return'Third Class';return'Pass'}
function cbadge(c){if(c===null)return'';if(c>=4.5)return'cf';if(c>=3.5)return'csu';if(c>=2.5)return'csl';if(c>=1.5)return'ct';return'cp'}
function gc(g){return g===null?'':g>=3.5?'g':g<2.0?'b':''}

// ── Keys ────────────────────────────────────────────────────
document.getElementById('au').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('ap').focus()});
document.getElementById('ap').addEventListener('keydown',e=>{if(e.key==='Enter')go()});

// ── Boot ────────────────────────────────────────────────────
if(tok)launch(true);else showAuth();
</script>
</body>
</html>
